<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Clip to Org</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fdfdf7;
        --fg: #1d1f24;
        --muted: #687078;
        --accent: #2e4a36;
        --accent-fg: #f5f1e8;
        --border: #d8d3c4;
        --error-bg: #fbe9e9;
        --error-fg: #8a2222;
        --ok-bg: #e9f3ec;
        --ok-fg: #1f5732;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1f221c;
          --fg: #ece9dd;
          --muted: #9aa19a;
          --accent: #b6d6b9;
          --accent-fg: #11140f;
          --border: #383d33;
          --error-bg: #3a1e1e;
          --error-fg: #f4b5b5;
          --ok-bg: #1c3324;
          --ok-fg: #b3dfbe;
        }
      }
      html, body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI",
          system-ui, sans-serif;
      }
      body { width: 340px; padding: 12px; }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 8px 0;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 4px;
        word-break: break-word;
        max-height: 3.6em;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .url {
        font-size: 11px;
        color: var(--muted);
        word-break: break-all;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin: 8px 0 2px;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font: inherit;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      .row-check {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 10px 0;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        align-items: center;
      }
      button {
        flex: 1;
        padding: 8px 12px;
        font: inherit;
        font-weight: 600;
        background: var(--accent);
        color: var(--accent-fg);
        border: 1px solid var(--accent);
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: progress; }
      button.ghost {
        flex: 0 0 auto;
        background: transparent;
        color: var(--muted);
        border-color: var(--border);
      }
      a.options {
        display: inline-block;
        margin-top: 10px;
        font-size: 11px;
        color: var(--muted);
        text-decoration: none;
      }
      a.options:hover { color: var(--fg); text-decoration: underline; }
      .status {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 4px;
        font-size: 12px;
        white-space: pre-wrap;
        display: none;
      }
      .status.ok    { display: block; background: var(--ok-bg);    color: var(--ok-fg); }
      .status.err   { display: block; background: var(--error-bg); color: var(--error-fg); }
      .status.info  { display: block; background: transparent;     color: var(--muted); }
    </style>
  </head>
  <body>
    <h1>Clip to Org</h1>
    <p class="title"    id="page-title">Loading…</p>
    <p class="url"      id="page-url"></p>

    <label for="tags">Tags (space- or comma-separated)</label>
    <input id="tags" type="text" autocomplete="off" spellcheck="false" placeholder="research webclip" />

    <div class="row-check">
      <input id="selection-only" type="checkbox" />
      <label for="selection-only" style="margin:0;text-transform:none;letter-spacing:0;color:var(--fg);">
        Use page selection only
      </label>
    </div>

    <div class="actions">
      <button id="reader-btn" type="button">Reading mode</button>
      <button id="clip-btn" type="button">Clip page</button>
    </div>
    <div class="actions">
      <button id="cancel-btn" type="button" class="ghost" style="flex:1">Close</button>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <a class="options" href="#" id="open-options">Options &rsaquo;</a>

    <script src="popup.js" type="module"></script>
  </body>
</html>
