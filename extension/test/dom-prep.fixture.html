<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>dom-prep fixture</title>
    <!-- Loads the REAL helper. If the file is missing, the global is undefined
         and the "fix" checks below record FAIL (the red phase). -->
    <script src="../src/dom-prep.js"></script>
  </head>
  <body>
    <div id="result">running…</div>
    <script>
      (function () {
        const results = [];
        const check = (name, cond) => results.push((cond ? "PASS" : "FAIL") + ": " + name);

        // A post-render Mermaid block: <pre class="mermaid-chart"> whose original
        // source the theme stashed in data-mermaid-src, now holding an <svg> with
        // an injected <style> + concatenated <text> labels. This is exactly what
        // Defuddle sees on the live page.
        const page = document.createElement("div");
        page.innerHTML =
          '<p class="keep">Intro paragraph.</p>' +
          '<pre class="mermaid-chart" data-processed="true" ' +
          'data-mermaid-src="flowchart LR&#10;  A--&gt;B&#10;  B--&gt;C">' +
          '<svg id="mermaid-1"><style>#mermaid-1{fill:#ccc;font-family:x}</style>' +
          "<g><text>A</text><text>B</text><text>C</text></g></svg>" +
          "</pre>" +
          '<p class="keep">Outro paragraph.</p>';

        // Repro: confirm the rendered <pre> really does carry the CSS + labels.
        const preText = page.querySelector("pre").textContent;
        check("repro: pre textContent carries injected CSS", /#mermaid-1\{fill/.test(preText));
        check("repro: pre textContent carries concatenated labels", /ABC/.test(preText.replace(/\s+/g, "")));

        // Fix: run the real helper on a clone (mirrors extraction).
        try {
          if (!globalThis.OrgClipperDomPrep || typeof globalThis.OrgClipperDomPrep.prepCloneForExtract !== "function") {
            throw new Error("OrgClipperDomPrep.prepCloneForExtract not loaded");
          }
          const clone = page.cloneNode(true);
          globalThis.OrgClipperDomPrep.prepCloneForExtract(clone);

          check("fix: no <style> remains", clone.querySelectorAll("style").length === 0);
          check("fix: no <svg> remains", clone.querySelectorAll("svg").length === 0);
          const code = clone.querySelector("pre code.language-mermaid");
          check(
            "fix: mermaid source recovered into language-mermaid code",
            !!code && /flowchart LR/.test(code.textContent) && /A-->B/.test(code.textContent),
          );
          check("fix: paragraphs preserved", clone.querySelectorAll("p.keep").length === 2);
          check("fix: no CSS leak in cleaned pre", !/#mermaid-1\{/.test(clone.querySelector("pre").textContent));

          // Drop case: no source attribute -> svg dropped, no garbage left.
          const page2 = document.createElement("div");
          page2.innerHTML = '<pre class="mermaid"><svg><style>#m{fill:red}</style><text>X</text></svg></pre>';
          globalThis.OrgClipperDomPrep.prepCloneForExtract(page2);
          check("drop: svg+style removed when no source attr", page2.querySelectorAll("svg,style").length === 0);

          // --- inlineShadowRoots: cloneNode drops shadow roots; helper re-inlines them ---
          const sdHost = document.createElement("div");
          sdHost.innerHTML = '<div id="sd-host"></div><p id="sd-light">light</p>';
          const sroot = sdHost.querySelector("#sd-host").attachShadow({ mode: "open" });
          sroot.innerHTML = '<article><h1>Shadow Heading</h1><p>shadow body</p></article>';
          const sdClone = sdHost.cloneNode(true);
          check("shadow: baseline cloneNode drops shadow content", !/Shadow Heading/.test(sdClone.querySelector("#sd-host").innerHTML));
          globalThis.OrgClipperDomPrep.inlineShadowRoots(sdHost, sdClone);
          check("shadow: content inlined into clone", /Shadow Heading/.test(sdClone.querySelector("#sd-host").innerHTML));
          check("shadow: light DOM preserved", /light/.test(sdClone.querySelector("#sd-light").textContent));
          check("shadow: live element NOT mutated", sdHost.querySelector("#sd-host").children.length === 0);

          // --- resolveUrls: relative src/href/srcset -> absolute against an explicit base ---
          const urlPage = document.createElement("div");
          urlPage.innerHTML =
            '<a id="u-a" href="/p?x=1">a</a>' +
            '<img id="u-img" src="img/p.png">' +
            '<img id="u-ss" srcset="a.png 1x, /b.png 2x, https://c.com/c.png 3x">' +
            '<a id="u-abs" href="https://abs.com/y">y</a>' +
            '<a id="u-frag" href="#sec">f</a>';
          const urlClone = urlPage.cloneNode(true);
          globalThis.OrgClipperDomPrep.resolveUrls(urlClone, "https://ex.com/dir/");
          const ug = (id, a) => urlClone.querySelector("#" + id).getAttribute(a);
          check("url: relative href absolutised", ug("u-a", "href") === "https://ex.com/p?x=1");
          check("url: relative img src absolutised", ug("u-img", "src") === "https://ex.com/dir/img/p.png");
          check("url: srcset resolved per entry", ug("u-ss", "srcset") === "https://ex.com/dir/a.png 1x, https://ex.com/b.png 2x, https://c.com/c.png 3x");
          check("url: absolute href untouched", ug("u-abs", "href") === "https://abs.com/y");
          check("url: in-page #frag untouched", ug("u-frag", "href") === "#sec");

          // --- budget: a large OPEN shadow tree must inline only up to the cap
          //     (guards the freeze fix: unbounded inlining blocks the main thread) ---
          (function () {
            function buildShadow(host, depth, breadth) {
              const sr = host.attachShadow({ mode: "open" });
              const wrap = document.createElement("div"); sr.appendChild(wrap);
              for (let i = 0; i < breadth; i++) {
                const leaf = document.createElement("span"); leaf.className = "sb"; wrap.appendChild(leaf);
                if (depth > 0) { const ch = document.createElement("section"); wrap.appendChild(ch); buildShadow(ch, depth - 1, breadth); }
              }
            }
            const big = document.createElement("div");
            buildShadow(big, 5, 4); // ~32k span nodes across nested open shadow roots
            const bigClone = big.cloneNode(true);
            globalThis.OrgClipperDomPrep.inlineShadowRoots(big, bigClone);
            const inlined = bigClone.querySelectorAll("span.sb").length;
            check("budget: large open-shadow inlining is bounded (not all ~32k)", inlined > 500 && inlined < 20000);
          })();
        } catch (e) {
          check("helper ran: " + e.message, false);
        }

        const ok = results.length > 0 && results.every((r) => r.startsWith("PASS"));
        document.getElementById("result").textContent = (ok ? "ALL PASS" : "FAILED") + " :: " + results.join(" | ");
      })();
    </script>
  </body>
</html>
